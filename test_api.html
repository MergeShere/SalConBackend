<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Connect — API Test Console</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;display:flex;min-height:100vh}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#1a1d27}
  ::-webkit-scrollbar-thumb{background:#3d4155;border-radius:3px}

  /* SIDEBAR */
  #sidebar{width:270px;min-width:270px;background:#141720;border-right:1px solid #252836;height:100vh;overflow-y:auto;position:sticky;top:0;display:flex;flex-direction:column}
  #sidebar header{padding:20px 16px 12px;border-bottom:1px solid #252836}
  #sidebar header h1{font-size:14px;font-weight:700;color:#fff;letter-spacing:.5px}
  #sidebar header p{font-size:11px;color:#7c85a2;margin-top:2px}
  .nav-section{padding:8px 0}
  .nav-section-label{padding:8px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a5470}
  .nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12px;color:#8892ab;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
  .nav-item:hover{color:#e2e8f0;background:#1e2232;border-left-color:#3d4155}
  .nav-item.active{color:#fff;background:#1e2232;border-left-color:#6c63ff}
  .nav-item .badge{margin-left:auto;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600}
  .badge.get{background:#0d3321;color:#34d399}
  .badge.post{background:#0d2240;color:#60a5fa}
  .badge.put{background:#2d1a00;color:#fb923c}
  .badge.del{background:#2d0d0d;color:#f87171}
  .badge.patch{background:#200d30;color:#c084fc}

  /* MAIN */
  #main{flex:1;overflow-y:auto;background:#0f1117}
  #topbar{background:#141720;border-bottom:1px solid #252836;padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
  #topbar label{font-size:12px;color:#7c85a2;white-space:nowrap}
  #base-url{flex:1;background:#0f1117;border:1px solid #252836;border-radius:6px;padding:7px 12px;color:#e2e8f0;font-size:13px;outline:none}
  #base-url:focus{border-color:#6c63ff}
  #token-input{flex:2;background:#0f1117;border:1px solid #252836;border-radius:6px;padding:7px 12px;color:#e2e8f0;font-size:12px;font-family:monospace;outline:none}
  #token-input:focus{border-color:#6c63ff}
  #token-input::placeholder{color:#3d4155}

  #content{padding:24px}
  .section-header{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;padding-top:8px}
  .section-desc{font-size:12px;color:#7c85a2;margin-bottom:20px}

  /* ENDPOINT CARD */
  .endpoint{background:#141720;border:1px solid #252836;border-radius:10px;margin-bottom:12px;overflow:hidden;transition:border-color .2s}
  .endpoint:hover{border-color:#3d4155}
  .endpoint-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none}
  .method-badge{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.5px;min-width:54px;text-align:center}
  .method-badge.GET{background:#0d3321;color:#34d399}
  .method-badge.POST{background:#0d2240;color:#60a5fa}
  .method-badge.PUT{background:#2d1a00;color:#fb923c}
  .method-badge.DELETE{background:#2d0d0d;color:#f87171}
  .method-badge.PATCH{background:#200d30;color:#c084fc}
  .endpoint-path{font-family:monospace;font-size:13px;color:#e2e8f0;flex:1}
  .endpoint-desc{font-size:11px;color:#5a6380;flex:2;text-align:right}
  .auth-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:#1e1a00;color:#fbbf24;font-weight:600}

  /* ENDPOINT BODY */
  .endpoint-body{display:none;padding:16px;border-top:1px solid #1e2232}
  .endpoint-body.open{display:block}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .form-grid.single{grid-template-columns:1fr}
  .field-group{display:flex;flex-direction:column;gap:4px}
  .field-group label{font-size:11px;color:#7c85a2;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .field-group input,.field-group textarea,.field-group select{background:#0f1117;border:1px solid #252836;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
  .field-group input:focus,.field-group textarea:focus,.field-group select:focus{border-color:#6c63ff}
  .field-group textarea{min-height:80px;resize:vertical;font-family:monospace;font-size:12px}
  .field-group select option{background:#141720}
  .send-btn{background:#6c63ff;color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
  .send-btn:hover{background:#7c73ff}
  .send-btn:active{background:#5b52ef}

  /* RESPONSE */
  .response-area{margin-top:12px;display:none}
  .response-area.visible{display:block}
  .response-meta{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .status-code{font-size:13px;font-weight:700;padding:2px 10px;border-radius:5px}
  .status-2xx{background:#0d3321;color:#34d399}
  .status-4xx{background:#2d0d0d;color:#f87171}
  .status-5xx{background:#2d0000;color:#ef4444}
  .response-time{font-size:11px;color:#5a6380}
  .response-json{background:#090b10;border:1px solid #1e2232;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;color:#a9b8d4;line-height:1.5}

  /* HELPERS */
  .helper-text{font-size:11px;color:#5a6380;margin-bottom:10px;padding:8px 10px;background:#0f1117;border-radius:5px;border-left:3px solid #3d4155}
  .divider{height:1px;background:#1e2232;margin:6px 0}
  #no-selection{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;color:#3d4155}
  #no-selection svg{width:60px;height:60px;margin-bottom:16px;opacity:.3}
  #no-selection p{font-size:14px}
  .section-scroll-target{padding-top:4px}

  /* TOKEN QUICK-FILL */
  .token-quick{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .tq-btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #252836;background:#141720;color:#8892ab;cursor:pointer;transition:all .15s}
  .tq-btn:hover{background:#1e2232;color:#e2e8f0;border-color:#3d4155}

  .copied{position:fixed;bottom:20px;right:20px;background:#34d399;color:#0a1f14;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999}
  .copied.show{opacity:1}

  @media(max-width:768px){
    #sidebar{display:none}
    .form-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <header>
    <h1>Salon Connect</h1>
    <p>API Test Console</p>
  </header>
  <div id="nav-links"></div>
</nav>

<!-- MAIN -->

    <label>Base URL</label>

  <div id="content">
    <div id="endpoint-sections"></div>

</div>

<div class="copied" id="toast">Copied!</div>

// ============================================================
// BUILD UI
// ============================================================
let counter = 0;

function buildNav(){
  const nav = document.getElementById('nav-links');
  SECTIONS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'nav-section';
    div.innerHTML = `<div class="nav-section-label">${s.label}</div>`;
    s.endpoints.forEach(ep => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.href = '#ep-'+ep.__id;
      a.innerHTML = `<span class="badge ${ep.m}">${ep.m}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px">${ep.p}</span>`;
      div.appendChild(a);
    });
    nav.appendChild(div);
  });
}

function buildSections(){
  const cont = document.getElementById('endpoint-sections');
  SECTIONS.forEach(s => {
    const wrap = document.createElement('div');
    wrap.className = 'section-scroll-target';
    wrap.id = 'section-'+s.id;
    wrap.innerHTML = `<div class="section-header">${s.label}</div><div class="section-desc">${s.desc}</div>`;
    s.endpoints.forEach(ep => {
      ep.__id = ++counter;
      wrap.appendChild(buildEndpointCard(ep));
    });
    cont.appendChild(wrap);
  });
}

function buildEndpointCard(ep){
  const card = document.createElement('div');
  card.className = 'endpoint';
  card.id = 'ep-'+ep.__id;

  const header = document.createElement('div');
  header.className = 'endpoint-header';
  header.innerHTML = `
    <span class="method-badge ${ep.m}">${ep.m}</span>
    <span class="endpoint-path">${ep.p}</span>
    <span class="endpoint-desc">${ep.d}</span>
    ${ep.auth ? '<span class="auth-tag">AUTH</span>' : ''}
  `;

  const body = document.createElement('div');
  body.className = 'endpoint-body';
  body.innerHTML = buildForm(ep);

  header.addEventListener('click', () => {
    body.classList.toggle('open');
  });

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

function buildForm(ep){
  let html = '';

  if(ep.openTab){
    return `<button class="send-btn" onclick="window.open(API()+'${ep.p}','_blank')">Open in browser</button>`;
  }

  // Path params
  if(ep.pathParams && ep.pathParams.length){
    html += `<div class="form-grid">`;
    ep.pathParams.forEach(f => {
      html += `<div class="field-group"><label>${f.l} <small style="color:#f87171">(path)</small></label>
        <input id="pp-${ep.__id}-${f.k}" type="text" placeholder="${f.ph}" value="${f.ph}"></div>`;
    });
    html += `</div>`;
  }

  // Query params
  if(ep.query && ep.query.length){
    html += `<div class="helper-text">Query parameters (leave blank to omit)</div><div class="form-grid">`;
    ep.query.forEach(f => {
      html += `<div class="field-group"><label>${f.l}</label>
        <input id="qp-${ep.__id}-${f.k}" type="text" placeholder="${f.ph}"></div>`;
    });
    html += `</div>`;
  }

  // Body fields
  if(ep.fields && ep.fields.length){
    html += `<div class="form-grid${ep.fields.length === 1 ? ' single' : ''}">`;
    ep.fields.forEach(f => {
      if(f.t === 'textarea'){
        html += `<div class="field-group" style="grid-column:1/-1"><label>${f.l}</label>
          <textarea id="f-${ep.__id}-${f.k}" placeholder="${f.ph}">${f.t==='textarea'&&f.k==='__json__'?f.ph:''}</textarea></div>`;
      } else if(f.t === 'select'){
        const opts = f.opts.map(o => `<option value="${o}">${o||'(none)'}</option>`).join('');
        html += `<div class="field-group"><label>${f.l}</label><select id="f-${ep.__id}-${f.k}">${opts}</select></div>`;
      } else {
        html += `<div class="field-group"><label>${f.l}</label>
          <input id="f-${ep.__id}-${f.k}" type="${f.t}" placeholder="${f.ph}"></div>`;
      }
    });
    html += `</div>`;
  }

  html += `<button class="send-btn" onclick="sendRequest(${ep.__id})">Send Request</button>`;
  html += `<div class="response-area" id="resp-${ep.__id}">
    <div class="response-meta" id="meta-${ep.__id}"></div>
    <pre class="response-json" id="json-${ep.__id}"></pre>
    <button class="tq-btn" style="margin-top:6px" onclick="copyResp(${ep.__id})">Copy response</button>
  </div>`;
  return html;
}

// ============================================================
// REQUEST LOGIC
// ============================================================
const EP_MAP = {};
function buildMap(){ SECTIONS.forEach(s => s.endpoints.forEach(ep => EP_MAP[ep.__id] = ep)); }

async function sendRequest(id){
  const ep = EP_MAP[id];
  if(!ep) return;

  // Resolve path params
  let path = ep.p;
  if(ep.pathParams){
    ep.pathParams.forEach(f => {
      const val = document.getElementById(`pp-${id}-${f.k}`)?.value || f.ph;
      path = path.replace(`{${f.k}}`, encodeURIComponent(val));
    });
  }

  // Query params
  const qp = new URLSearchParams();
  if(ep.query){
    ep.query.forEach(f => {
      const val = document.getElementById(`qp-${id}-${f.k}`)?.value;
      if(val) qp.set(f.k, val);
    });
  }
  const qs = qp.toString();
  const url = API() + path + (qs ? '?'+qs : '');

  // Headers
  const headers = {'Content-Type':'application/json'};
  if(ep.auth && TOKEN()) headers['Authorization'] = 'Bearer '+TOKEN();

  // Body
  let body = undefined;
  if(['POST','PUT','PATCH'].includes(ep.m) && ep.fields && ep.fields.length){
    const jsonField = document.getElementById(`f-${id}-__json__`);
    if(jsonField){
      try{ body = jsonField.value; JSON.parse(body); }
      catch(e){ showResp(id, 0, 0, {error:'Invalid JSON: '+e.message}); return; }
    } else {
      const obj = {};
      ep.fields.forEach(f => {
        const el = document.getElementById(`f-${id}-${f.k}`);
        if(el && el.value !== '') obj[f.k] = f.t==='number' ? Number(el.value) : el.value;
      });
      body = JSON.stringify(obj);
    }
  }

  const btn = document.querySelector(`#ep-${id} .send-btn`);
  if(btn){ btn.textContent = 'Sending...'; btn.disabled = true; }

  const t0 = Date.now();
  try{
    const opts = {method:ep.m, headers};
    if(body) opts.body = body;
    const res = await fetch(url, opts);
    const ms = Date.now()-t0;
    let data;
    const ct = res.headers.get('content-type')||'';
    if(ct.includes('json')) data = await res.json();
    else data = await res.text();
    showResp(id, res.status, ms, data);

    // Auto-fill token if login succeeded
    if(res.ok && (ep.p.includes('/login') || ep.p.includes('/otp/verify'))){
      const token = data?.access_token;
      if(token){ document.getElementById('token-input').value = token; showToast('Token auto-filled!'); }
    }
  } catch(e){
    const ms = Date.now()-t0;
    showResp(id, 0, ms, {error: String(e)});
  } finally {
    if(btn){ btn.textContent = 'Send Request'; btn.disabled = false; }
  }
}

function showResp(id, status, ms, data){
  const ra = document.getElementById(`resp-${id}`);
  const meta = document.getElementById(`meta-${id}`);
  const json = document.getElementById(`json-${id}`);
  ra.classList.add('visible');

  const cls = status >= 500 ? 'status-5xx' : status >= 400 ? 'status-4xx' : status > 0 ? 'status-2xx' : 'status-4xx';
  const label = status > 0 ? status : 'ERR';
  meta.innerHTML = `<span class="status-code ${cls}">${label}</span><span class="response-time">${ms}ms</span>`;

  if(typeof data === 'object') json.textContent = JSON.stringify(data, null, 2);
  else json.textContent = data;
}

function copyResp(id){
  const text = document.getElementById(`json-${id}`)?.textContent;
  if(text){ navigator.clipboard.writeText(text); showToast('Copied!'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Init
buildNav();
buildSections();
buildMap();

// Highlight nav on scroll
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      document.querySelectorAll('.nav-item').forEach(a=>{
        a.classList.remove('active');
        if(a.getAttribute('href')==='#'+e.target.id) a.classList.add('active');
      });
    }
  });
},{threshold:0.1,rootMargin:'-60px 0px -80% 0px'});
document.querySelectorAll('.endpoint').forEach(el=>observer.observe(el));
</script>
