<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body>
    <h2>Reset Password</h2>
    <form id="reset-password-form">
        <label for="password">New Password:</label>
        <input type="password" id="password" name="password" required>
        <label for="confirm_password">Confirm New Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <button type="submit">Reset Password</button>
    </form>
    <p id="message"></p>

    <script>
        document.getElementById('reset-password-form').addEventListener('submit', async function(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const messageElement = document.getElementById('message');
            messageElement.textContent = '';

            const urlParams = new URLSearchParams(window.location.search);
            const encoded_pk = urlParams.get('encoded_pk');
            const token = urlParams.get('token');

            if (!encoded_pk || !token) {
                messageElement.textContent = 'Invalid reset link.';
                return;
            }

            try {
                const response = await fetch(`/api/v1/user/reset-password/${encoded_pk}/${token}/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        password: password, 
                        confirm_password: confirm_password,
                        encoded_pk: encoded_pk,
                        token: token
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    messageElement.textContent = data.message;
                } else {
                    messageElement.textContent = data.message || 'An error occurred.';
                }
            } catch (error) {
                messageElement.textContent = 'An error occurred. Please try again.';
            }
        });
    </script>
</body>
</html>
